discovery_task:
  description: >
    1. Scan the provided target directory.
    2. Identify the Python file with the highest technical debt (Cyclomatic Complexity).
    3. Output the exact file path.
  expected_output: "The file path of the most complex Python file that requires refactoring."
  agent: discovery_agent

refactoring_task:
  description: >
    1. Read the code from the file identified in the discovery_task.
    2. Refactor the code to reduce cyclomatic complexity and improve readability.
    3. DO NOT change the function names, parameters, or return types.
    4. DO NOT add any new 'import' statements that were not in the original code.
  expected_output: "The fully refactored Python code string, maintaining absolute semantic equivalence."
  agent: refactoring_agent

verification_task:
  description: >
    Take both the original code and the refactored code. You MUST use your tools to perform the following:
    1. Run the AST Validator tool to check for Semantic Drift (API signature changes or unapproved imports).
    2. Run the Complexity Analyzer tool to calculate Delta D (Technical Debt Reduction).
    3. Run the Test Runner tool to execute parameterized unit tests.
    4. Compile the results into a formal safety report.
  expected_output: "A formal Verification Report detailing AST validation results, Delta D score, and Test Pass/Fail status."
  agent: verification_agent

rollback_task:
  description: >
    1. Read the formal Verification Report produced by the verification_task.
    2. If the report indicates ANY failures (Semantic Drift == True, Delta D <= 0, or Tests Failed), you MUST trigger the Git Rollback tool.
    3. If the report is completely successful, confirm the merge and state that the debt was successfully reduced.
  expected_output: "A final operation status report stating either 'SUCCESSFUL MERGE' or 'ROLLBACK EXECUTED' with the supporting reasons."
  agent: rollback_agent